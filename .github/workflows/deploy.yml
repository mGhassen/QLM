name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'Production'
        type: choice
        options:
          - Production
          - Development

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_WEBAPP_SERVER_NAME: ${{ secrets.AZURE_WEBAPP_SERVER_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  REGISTRY_NAME: ${{ secrets.AZURE_REGISTRY_NAME }}
  IMAGE_NAME_WEB: qwery-enterprise-web
  IMAGE_NAME_SERVER: qwery-enterprise-server

jobs:
  build-and-deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'push' && 'Production' || inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Extract version and git hash
        id: version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "GIT_HASH=$GIT_HASH" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$VERSION-$GIT_HASH" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG_LATEST=latest" >> $GITHUB_OUTPUT

      - name: Verify required environment variables
        run: |
          echo "Environment: ${{ github.event_name == 'push' && 'Production' || inputs.environment }}"
          echo "Checking required variables..."
          
          MISSING_VARS=()
          [ -z "${{ vars.VITE_SITE_URL }}" ] && MISSING_VARS+=("VITE_SITE_URL")
          [ -z "${{ vars.VITE_PRODUCT_NAME }}" ] && MISSING_VARS+=("VITE_PRODUCT_NAME")
          [ -z "${{ vars.VITE_SITE_TITLE }}" ] && MISSING_VARS+=("VITE_SITE_TITLE")
          [ -z "${{ vars.VITE_SITE_DESCRIPTION }}" ] && MISSING_VARS+=("VITE_SITE_DESCRIPTION")
          
          if [ ${#MISSING_VARS[@]} -gt 0 ]; then
            echo "ERROR: Missing required environment variables:"
            printf '  - %s\n' "${MISSING_VARS[@]}"
            echo ""
            echo "Please ensure these variables are set in the GitHub environment: ${{ github.event_name == 'push' && 'Production' || inputs.environment }}"
            exit 1
          fi
          
          echo "✓ All required variables are set"

      - name: Build and push web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WEB }}:${{ steps.version.outputs.IMAGE_TAG }}
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WEB }}:${{ steps.version.outputs.IMAGE_TAG_LATEST }}
          cache-from: type=registry,ref=${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WEB }}:buildcache
          cache-to: type=registry,ref=${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WEB }}:buildcache,mode=max
          build-args: |
            VITE_APP_VERSION=${{ steps.version.outputs.VERSION }}
            VITE_APP_GIT_HASH=${{ steps.version.outputs.GIT_HASH }}
            VITE_SITE_URL=${{ vars.VITE_SITE_URL }}
            VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
            VITE_AUTH_PASSWORD=${{ vars.VITE_AUTH_PASSWORD }}
            VITE_DATABASE_PROVIDER=${{ vars.VITE_DATABASE_PROVIDER }}
            VITE_DEFAULT_THEME_MODE=${{ vars.VITE_DEFAULT_THEME_MODE }}
            VITE_DISPLAY_TERMS_AND_CONDITIONS_CHECKBOX=${{ vars.VITE_DISPLAY_TERMS_AND_CONDITIONS_CHECKBOX }}
            VITE_PRODUCT_NAME=${{ vars.VITE_PRODUCT_NAME }}
            VITE_SITE_DESCRIPTION=${{ vars.VITE_SITE_DESCRIPTION }}
            VITE_SITE_TITLE=${{ vars.VITE_SITE_TITLE }}
            VITE_THEME_COLOR=${{ vars.VITE_THEME_COLOR }}
            VITE_WORKING_DIR=${{ vars.VITE_WORKING_DIR }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_CHAT_API_URL=${{ vars.VITE_CHAT_API_URL }}

      - name: Build and push server Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_SERVER }}:${{ steps.version.outputs.IMAGE_TAG }}
            ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_SERVER }}:${{ steps.version.outputs.IMAGE_TAG_LATEST }}
          cache-from: type=registry,ref=${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_SERVER }}:buildcache
          cache-to: type=registry,ref=${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_SERVER }}:buildcache,mode=max

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy web to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          images: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WEB }}:${{ steps.version.outputs.IMAGE_TAG }}

      - name: Deploy server to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_SERVER_NAME }}
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          images: ${{ secrets.AZURE_REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME_SERVER }}:${{ steps.version.outputs.IMAGE_TAG }}

      - name: Azure logout
        run: az logout
        if: always()

