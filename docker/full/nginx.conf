server {
  listen 3000;

  # Dev: Supabase/auth cookies can get large.
  client_header_buffer_size 16k;
  large_client_header_buffers 4 32k;

  # Simple health endpoint
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Bun serves GET /health at root; probes often use /api/health behind ingress.
  location = /api/health {
    proxy_pass http://127.0.0.1:4096/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Vite client output lives here; serving from nginx avoids SSR returning HTML for *.js / *.css.
  location ^~ /assets/ {
    root /app/apps/web/dist/client;
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ^~ /images/ {
    root /app/apps/web/dist/client;
    try_files $uri =404;
    access_log off;
  }

  location ^~ /extensions/ {
    root /app/apps/web/dist/client;
    try_files $uri =404;
    access_log off;
  }

  location = /mockServiceWorker.js {
    root /app/apps/web/dist/client;
    try_files $uri =404;
    access_log off;
  }

  # Stray probes (devtools / extensions) request `/config.js`; HTML breaks script parsing.
  location = /config.js {
    default_type application/javascript;
    return 200 '/*noop*/';
  }

  # API
  location /api/ {
    # No trailing slash: preserve "/api/*" prefix upstream.
    proxy_pass http://127.0.0.1:4096;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
  }

  # Everything else to web SSR
  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

